# cargo-deny configuration
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# cargo-deny 0.19 expects scope selection for unmaintained checks.
# Use full graph coverage; lint level is handled by cargo-deny's advisory output policy.
unmaintained = "all"
ignore = [
    # Deferred to Wave 8.2 dependency remediation (P2-11).
    { id = "RUSTSEC-2025-0141", reason = "Transitive via burn-core; tracked in docs/plans/v0.1.0-alpha.8x-phase2-remediation-roadmap.md as P2-11." },
]

[licenses]
# Allow-list policy: only SPDX IDs listed below are accepted.
# Strong copyleft licenses (GPL/AGPL/LGPL) are implicitly denied by omission.
allow = [
    "MPL-2.0",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Deny specific crates if needed:
# deny = [
#     { name = "some-crate", reason = "security concern" }
# ]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
